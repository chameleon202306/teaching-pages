  <meta name="description" content="有趣的单词消消乐，帮助孩子快乐学单词">
  <title>单词消消乐 - 快乐学单词</title>

  <div id="app"></div>
  <script>
    // ==================== 音效管理器 ====================
    class SoundManager {
      constructor() {
        this.audioContext = null;
        this.speechSynthesis = null;
        this.currentUtterance = null;
      }

      getContext() {
        if (!this.audioContext) {
          this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        return this.audioContext;
      }

      getSpeechSynthesis() {
        if (!this.speechSynthesis) {
          this.speechSynthesis = window.speechSynthesis;
        }
        return this.speechSynthesis;
      }

      playNote(frequency, duration, volume) {
        volume = volume || 0.3;
        try {
          var ctx = this.getContext();
          var oscillator = ctx.createOscillator();
          var gainNode = ctx.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(ctx.destination);
          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);
          gainNode.gain.setValueAtTime(0, ctx.currentTime);
          gainNode.gain.linearRampToValueAtTime(volume, ctx.currentTime + 0.02);
          gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
          oscillator.start(ctx.currentTime);
          oscillator.stop(ctx.currentTime + duration);
        } catch (e) {}
      }

      playChord(frequencies, duration, volume) {
        volume = volume || 0.15;
        frequencies.forEach(function(freq) { this.playNote(freq, duration, volume); }.bind(this));
      }

      playArpeggio(frequencies, noteDuration, delayBetween) {
        frequencies.forEach(function(freq, index) {
          var self = this;
          setTimeout(function() { self.playNote(freq, noteDuration, 0.25); }, index * delayBetween);
        }.bind(this));
      }

      speakWord(word) {
        try {
          var synth = this.getSpeechSynthesis();
          if (!synth) return;
          if (this.currentUtterance) synth.cancel();
          var utterance = new SpeechSynthesisUtterance(word);
          utterance.lang = "en-US";
          utterance.rate = 0.8;
          utterance.pitch = 1.0;
          utterance.volume = 1.0;
          this.currentUtterance = utterance;
          synth.speak(utterance);
        } catch (e) {}
      }

      stopSpeaking() {
        var synth = this.getSpeechSynthesis();
        if (synth) synth.cancel();
      }

      playSelect() { this.playNote(880, 0.1, 0.2); }

      playCorrect() {
        var self = this;
        this.playChord([523, 659], 0.25, 0.15);
        setTimeout(function() { self.playChord([659, 784], 0.3, 0.12); }, 120);
      }

      playSuccess() {
        var self = this;
        this.playArpeggio([523, 659, 784, 1047], 0.2, 80);
        setTimeout(function() { self.playChord([784, 1047, 1319], 0.4, 0.1); }, 280);
      }

      playError() {
        var self = this;
        this.playNote(330, 0.15, 0.2);
        setTimeout(function() { self.playNote(294, 0.2, 0.18); }, 100);
      }

      playGameOver() {
        var self = this;
        var melody = [
          { freq: 523, delay: 0 }, { freq: 587, delay: 100 }, { freq: 659, delay: 200 },
          { freq: 698, delay: 300 }, { freq: 784, delay: 400 }, { freq: 880, delay: 500 }, { freq: 1047, delay: 600 }
        ];
        melody.forEach(function(note) {
          setTimeout(function() { self.playNote(note.freq, 0.2, 0.25); }, note.delay);
        });
        setTimeout(function() { self.playChord([784, 1047, 1319], 0.5, 0.12); }, 750);
      }

      playWarning() {
        var self = this;
        for (var i = 0; i < 3; i++) {
          setTimeout(function() { self.playNote(880, 0.08, 0.25); }, i * 120);
        }
      }

      playTimeout() {
        var self = this;
        [392, 349, 330, 294].forEach(function(freq, i) {
          setTimeout(function() { self.playNote(freq, 0.25, 0.2); }, i * 180);
        });
      }

      playClear() {
        var self = this;
        [392, 330, 262].forEach(function(freq, i) {
          setTimeout(function() { self.playNote(freq, 0.2, 0.2); }, i * 100);
        });
      }
    }

    var soundManager = new SoundManager();
